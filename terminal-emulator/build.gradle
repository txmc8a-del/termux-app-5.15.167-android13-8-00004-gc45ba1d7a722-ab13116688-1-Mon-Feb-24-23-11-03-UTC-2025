### Track Search
serviceId: track-search
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/track-search/documentation/index.md

Mastercard Track Search provides valuable Mastercard data to help better understand the multi-rail payment preferences of trading partners. Track search matches from Mastercard's merchant acceptance and Track Business Payment Service database to return key insights on supplier data, transaction message data, transaction recency data, etc. Primarily used by issuers, corporates, or Business Payment Service payment agents to increase efficiencies of commercial payment programs, track search provides access to key data from requested corporates for optimized commercial payment program planning.Why it matters: This matters for teams that need efficient, compliant partner discovery and verification across large datasets. By handling bulk requests and asynchronous completion, Track Search reduces manual lookups and operational friction, while ensuring searches are performed by the right parties under clear authorization rules. It can be used to initiate bulk search, check status, and retrieve results. 

