### Buyer Payment Agent
serviceId: mastercard-buyer-payment-agent
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/mastercard-buyer-payment-agent/documentation/index.md

Overview:  Mastercard Buyer Payment Agent enables Buyer Payment Agents (such as banks, procure-to-pay networks, and AP automation providers) to act on behalf of Buyers to submit and manage payment instructions to suppliers through Business Payment Service. The service supports card and account-to-account (A2A) payment initiation, status updates, and retrieval of payment instruction details, with global availability and certain use cases restricted by region. It also provides optional supplier verification (retrieve supplier details) and a structured linking process between buyers and suppliers to ensure the correct entities transact. Why It Matters: This API helps reduce friction in B2B transactions by standardizing payment processes, improving reconciliation, and enabling real-time data exchange. It supports use cases such as automated invoice payments, supplier onboarding, and payment preference enforcement. By connecting to Mastercard’s open-loop network, Buyer Payment Agents can reach a broader supplier base and offer more flexible payment options.

