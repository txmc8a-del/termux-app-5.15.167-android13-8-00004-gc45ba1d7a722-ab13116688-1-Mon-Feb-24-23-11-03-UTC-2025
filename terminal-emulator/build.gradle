### MATCH Pro
serviceId: match
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/match/documentation/index.md

Overview: MATCH Pro (Mastercard Alert To Control High-risk Merchants) is our mandatory system for Mastercard Acquirers to assess merchant risk before entering Merchant or Sponsored Merchant Agreements. It centralizes Authorized User–reported records of merchants (and their owners) terminated within the past five years, enabling an independent risk determination prior to onboarding and transaction submission. MATCH Pro provides automated, real-time access via APIs to support due diligence and ongoing risk review. Note: effective January 1, 2026, we will decommission legacy MATCH APIs and legacy MATCH bulk files through GFT; MATCH Pro will no longer support these files.Core functionality includes: submitting termination inquiries to identify exact or phonetic matches to previously terminated merchants; adding terminated merchants (with applicable reason codes) within five days, with immediate availability to other acquirers and a reference number confirmation; and retroactive inquiries that continuously monitor prior inquiries for 360 days and notify via email when a new possible match appears (retroactive matches are retained for 30 days and should be reviewed daily). Additional capabilities include retrieving inquiry history (past 365 days) and obtaining the originating acquirer’s contact details for further investigation, along with reference data for required address fields (countries, states, cities). By reducing due diligence and post-termination processing from a day to real-time responses, MATCH Pro helps acquirers efficiently identify and manage high-risk merchants. For broader merchant risk analysis, we also offer Onboarding Risk Check to assess cyber risk, sanctions exposure, and business identity verification.

