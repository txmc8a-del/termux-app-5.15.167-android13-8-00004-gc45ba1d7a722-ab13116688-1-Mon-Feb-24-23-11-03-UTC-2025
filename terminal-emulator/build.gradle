### MDES Customer Service
serviceId: mdes-customer-service
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/mdes-customer-service/documentation/index.md

Overview: MDES Customer Service is a set of APIs that enable issuers onboarded to MDES to manage the lifecycle of their own tokens and integrate tokenized information into their customer service interfaces. This service supports core servicing functions such as searching for tokens by PAN or Token Unique Reference (TUR), activating tokens, retrieving and resending activation methods, managing token states (suspend, unsuspend, delete, update), and viewing token status history. Additional capabilities include retrieving token-related transactions, submitting token comments, resetting mobile PINs, updating token assurance levels, disabling payment channels, and searching by token requestor.nnWhy it matters: These APIs enable issuers and customer service teams to efficiently resolve common servicing scenarios involving digital cards, such as reactivating tokens after device recovery, maintaining token continuity during PAN updates, and managing token identifiers during product migrations. The service is designed with privacy and compliance in mind—only partial PANs and token references are exposed, all traffic is encrypted using TLS 1.2, and the APIs are PCI DSS compliant. Token search supports pagination for large datasets, and transaction retrieval is limited to the past 30 days to support fraud investigations and customer inquiries. Issuers can test integrations in the MTF environment, and a web-based Customer Service portal is also available for operational support.

