### Ethoca Alerts Merchant API
serviceId: ethoca-alerts-for-merchants
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/ethoca-alerts-for-merchants/documentation/index.md

Overview: Ethoca Alerts is a collaborative tool that connects issuers and merchants together to share fraud and dispute data, enabling a faster dispute resolution process that reduces the need for chargebacks altogether.
 
The service provides two core APIs. Alerts Push API (outbound) delivers disputes that were shared by issuers to a merchant’s endpoint. Alerts Outcome API (inbound) lets merchants send back outcomes and feedback—such as refunded or not settled—so issuers know the issue was addressed and do not raise a chargeback. The end-to-end flow includes alert delivery, merchant acknowledgement, outcome submission, and confirmations back to both parties. Documentation includes use cases, tutorials, and test data to help teams connect and validate their flows.

