### MDES Token Connect
serviceId: mdes-token-connect
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/mdes-token-connect/documentation/index.md

Overview: MDES Token Connect enables Mastercard issuers to securely push payment card and account details to eligible token requestors—such as digital wallets, merchants, and commerce platforms—to initiate token creation. It supports issuer-initiated digitization from mobile banking apps or online banking platforms, allowing cardholders to provision their accounts instantly and securely. Core services include retrieving a list of enabled token requestors with metadata and logos, initiating push provisioning for one or multiple accounts, and generating a PushAccountReceipt with redirect URIs for token requestors to complete tokenization.nWhy It Matters: MDES Token Connect solves the challenge of fragmented, proprietary integrations by offering a scalable and interoperable framework. Once connected, issuers can reach any participating MDES token requestor through a single integration. This improves the cardholder experience by enabling instant provisioning, reducing manual entry, and allowing immediate use of tokenized credentials across digital wallets and merchant platforms. The service supports flows where consumers are redirected to token requestors to complete tokenization, and when needed, additional authentication can be performed via the consent service

Keywords: Push Provisioning, TAV, Redirect, Proprietary Communication, Pull Provisioning 

