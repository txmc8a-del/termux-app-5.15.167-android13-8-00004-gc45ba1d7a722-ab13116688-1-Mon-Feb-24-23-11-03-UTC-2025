### BIN Lookup
serviceId: bin-lookup
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/bin-lookup/documentation/index.md

Overview: BIN Lookup provides accurate, up-to-date bank identification number (BIN) and account range data to support decisions across the payments ecosystem. Partners are required to request and download the complete dataset at least every 6 days and deliver refreshed data to their customers daily, ensuring the most current issuer updates are reflected. The API supports unlimited calls, enabling seamless access to the latest BIN data as frequently as needed.n nWhy it matters: This API helps applications improve authorization routing, detect fraud, and support compliance and operational use cases by identifying card attributes such as brand, product type, issuer name, country code, and ICA number. It is particularly valuable for payment processors, acquirers, and merchants who need to make real-time decisions based on card characteristics.

