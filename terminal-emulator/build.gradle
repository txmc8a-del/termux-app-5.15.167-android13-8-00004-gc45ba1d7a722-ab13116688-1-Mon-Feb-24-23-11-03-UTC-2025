### Token Requestor Identifier API
serviceId: token-requestor-identifier-api
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/token-requestor-identifier-api/documentation/index.md

Overview: The Token Requestor Identifier (TRID) API is part of Mastercard’s Digital Enablement Service (MDES) and enables On-Behalf-Of Token Requestors (OBOTRs)—typically Payment Service Providers (PSPs)—to onboard and manage token requestors such as merchants or commerce platforms. The API allows OBOTRs to register token requestors in batches, update their details, and receive a unique Token Requestor Identifier (TRID) for each onboarded entity. This TRID is then used to tokenize card credentials via the MDES Tokenize API. The service supports streamlined onboarding, duplicate TRID detection, and eliminates manual errors through automation.Why It Matters: Token Requestor Identifier API helps PSPs operating in the On-Behalf-Of model manage token requestors across diverse merchant portfolios efficiently. It simplifies integration by offering a single interface for both creation and updates, reduces operational overhead, and ensures accurate token domain mapping. By enabling fast and secure onboarding, the API helps PSPs accelerate time to market for tokenized payment solutions and maintain consistency across digital commerce environments.

