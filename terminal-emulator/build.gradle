### Transaction Notifications
serviceId: transaction-notifications
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/transaction-notifications/documentation/index.md

Overview: Transaction Notifications is a powerful API that delivers real-time transaction data , including both authorization and clearing events, to applications with enrolled cardholders, once appropriate consent is obtained. It supports both bulk enrollment (via issuers, corporate admins, or fintech partners) and individual enrollment, where cardholders authenticate directly with the application.Once a card is enrolled, applications receive timely, context-rich notifications for eligible card activity, enabling dynamic engagement and personalized experiences.Why Use Transaction Notifications?Whether you're building a budgeting app, fraud alert system, loyalty platform, or personalized rewards experience, Transaction Notifications gives you the ability to react instantly to cardholder activity. This enables:Real-time engagement: Trigger contextual messages, offers, or insights the moment a transaction occurs.Enhanced user trust: Provide transparency and security through instant alerts and confirmations.Smarter personalization: Use transaction data to tailor experiences, recommendations, and financial insights.Developer-Friendly Features Transaction Notifications is built with developers in mind, offering:Hosted Web UI: For applications that prefer not to handle PCI data directly, we offer a secure, Mastercard-hosted web interface for cardholder enrollment and consent capture. Reliable delivery: Automatic retries for failed webhooks over a 24-hour window, with progressive backoff. Resilience: Undelivered notifications are stored for up to 7 days and can be retrieved via a dedicated API.Flexibility: Support for multiple webhook endpoints and customizable payloads to meet data separation and minimization requirements.

Keywords: Real-time transaction data, Cardholder purchase notifications, Expense management automation, Credit card transaction notification, Network transaction data, Personalized financial experiences

