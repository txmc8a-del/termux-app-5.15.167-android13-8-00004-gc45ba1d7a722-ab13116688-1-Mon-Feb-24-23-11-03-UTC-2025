### Identity Insights for Transactions
serviceId: identity-insights-for-transactions
authType: MTLS
sourceUrl: https://developer.mastercard.com/identity-insights-for-transactions/documentation/index.md

Identity Insights for Transactions is a risk intelligence service that delivers individual and device insights in a single payload to support safer, smoother card‑not‑present commerce. We address the challenge of balancing fraud prevention with customer experience by providing data and risk indicators that help you understand who the customer is and how their information is being used online, alongside device behavior signals to recognize trusted customers or flag suspicious activity. This helps reduce risk while enabling more legitimate transactions and long‑term customer value.The service can be used directly by merchants and acquirers or embedded by partners such as payment service providers and fraud platforms. It fits at multiple points in the transaction lifecycle—pre‑authentication, pre‑authorization, and post‑authorization—so teams can query insights and make informed risk decisions: proceed to authorization or authentication, decline, send for manual review, reverse, or continue to settlement/shipment. In PSD2 markets, acquirers can use these insights to help determine whether to apply TRA exemptions, route transactions for authentication, or decline, supporting optimized regulatory decisioning.

