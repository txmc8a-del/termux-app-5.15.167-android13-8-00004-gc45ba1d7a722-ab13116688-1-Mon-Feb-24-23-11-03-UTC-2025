### Mastercard Cross-Border Services
serviceId: cross-border-services
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/cross-border-services/documentation/index.md

Overview: Cross Border Services is a global payment service that provides access to faster, transparent payments between Senders and Recipients through multiple channels and payout methods. Mastercard Cross Border's supported services include the following: a technical system interface to initiate transactions, wholesale and retail foreign exchange rates and fees, customer support, settlement services between the customer and Mastercard, pricing and rate mechanism to determine up-front pricing information. Payment transfer types include the following: person-to-person (P2P), person-to-business (P2B), business-to-business (B2B), and business-to-person (B2P). Why it matters: The financial services industry faces growing global demand for more practical, digital solutions for cross-border payments. Cross-Border Services offers solutions for the evolving world of work, commerce and technologies, changing how money moves – both within countries and across borders – and fueling the need for a simple, scalable, trusted way for people and businesses to transact with confidence.  Customers are able to integrate with Cross-Border Services through APIs, payment files or SWIFT.

