### Merchant Self Services
serviceId: merchant-self-services
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/merchant-self-services/documentation/index.md

The Merchant Self Services API lets a user provide merchant details and configurations for their sub-merchants to help onboard as quickly as possible for Consumer Clarity or Alerts. Consumer Clarity lets a merchant user provide issuers and cardholders with real-time information about their company. The data provided helps reduce cardholder disputes for transactions that they don't recognize and first-party misuse that occurs when a consumer knowingly makes a purchase for goods or services and then disputes it as fraudulent. Alerts makes it easier for businesses to share and action data to help reduce chargebacks.
Why it matters: Primarily used for onboarding/creating merchants/sub-merchants and updating their data, Merchant Self Services' core functionality focuses on creating, retrieving, updating, and deleting merchant descriptors and card acceptor names at the sub-merchant location level, supporting use cases across Consumer Clarity and Alerts.

Keywords: Onboarding, integration, APIs 

