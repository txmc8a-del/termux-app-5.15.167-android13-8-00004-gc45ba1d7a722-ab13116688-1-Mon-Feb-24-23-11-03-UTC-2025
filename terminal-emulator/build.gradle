### In Control for Commercial Payments
serviceId: iccp
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/iccp/documentation/index.md

In Control for Commercial Payments (ICCP) streamlines business transactions using oconfiguratble spending controls and enhanced data. It allow you to create and manage virtual card numbers (VCNs) that offer a flexible, simple, and secure way to pay, while capturing the data you need to reconcile payments later. Specifically, the ICCP API allows issuers, corporations, and payment service providers to perform the following processes: generating a unique card number for every transaction, setting transaction level controls, getting enhanced data, automating reconciliation, and controlling workflow.Why it matters: The ICCP API can be used to manage the underlying real cards that fund virtual card payments by allowing users to retrieve, update, and delete primary billing account information. Among other things, it has the following key use cases: creating a virtual card to pay an invoice, reconciling business to business (B2B) payments, updating virtual card, canceling virtual cards, obtaining entity identifiers, and managing real cards. The service provides resource discovery (real cards, purchase templates, suppliers) to streamline setup and governance of payments, and supports reconciliation through invoice addenda and reporting on VCN authorizations and clearings, including clearing control capabilities and related reports. ICCP helps accounts payable teams make fast, secure invoice payments, capture early payment discounts, and retain the credit benefits of card payments.

