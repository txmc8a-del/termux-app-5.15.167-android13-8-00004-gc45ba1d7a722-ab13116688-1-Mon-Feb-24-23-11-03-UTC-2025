### Currency Conversion for Originating Institution
serviceId: payment-currency-conversion
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/payment-currency-conversion/documentation/index.md

The Currency Conversion Calculator for Originating Institution Reconciliation API enables Originating institutions to instantly access daily currency conversion rates for Mastercard Send cross-border payment transactions to Mastercard cards. This helps them determine the funds needed to reconcile with Mastercard before initiating a cross-border payment transactions. The currency conversion API provides a list of currencies for which Mastercard publish rates daily, the conversion rate statuses that have been published for a given data, and payment details based on the conversion rates (calculated settlement, transaction amount and currency, settlement currency, etc.).Why it matters: Primarily meant for originating institutions, the currency conversion calculator for originating institution reconciliation API calls for each cross-border payment transaction where the transaction currency differs from the settlement currency. The API response provides the currency conversion rate and settlement amount. This has a variety of use cases, primarily involving situations where originating institutions need conversion and currency details for transactions. 

