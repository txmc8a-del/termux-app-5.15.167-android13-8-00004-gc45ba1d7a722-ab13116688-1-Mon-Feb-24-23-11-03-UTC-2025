### MDES Digital Enablement API
serviceId: mdes-digital-enablement
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/mdes-digital-enablement/documentation/index.md

Overview: The MDES Digital Enablement API is a Mastercard service that allows merchants, wallet providers, and other token requestors to tokenize cardholder PANs and manage the lifecycle of digital tokens for secure e-commerce and in-app transactions. It supports token creation, transaction cryptogram generation for Digital Secure Remote Payment (DSRP), token suspension and unsuspension, asset retrieval, and outbound notifications for token updates. The API is designed to work with Mastercard and Maestro cards, and supports both direct merchant integrations and “on-behalf-of” models via payment service providers. It also enables push provisioning through Token Connect, allowing consumers to securely transfer tokenized payment credentials from their issuer’s app to merchant platforms.Why It Matters: The MDES Digital Enablement API plays a critical role in enabling secure, scalable, and convenient digital payments. By replacing sensitive card data with tokens, it reduces the risk of fraud and protects cardholder information across digital channels. It supports seamless checkout experiences, improves token lifecycle management, and enables merchants to comply with security standards like PCI DSS. The API is encrypted end-to-end, supports OAuth 1.0a authentication, and ensures sensitive data is protected using Mastercard’s encryption protocols. It is a foundational component of Mastercard’s tokenization ecosystem, helping partners accelerate time to market and expand digital payment capabilities.

Keywords: Digital Enablement API, M4M API, MDES For Merchants, Digital Enablement for Merchants, Merchant Tokenization

