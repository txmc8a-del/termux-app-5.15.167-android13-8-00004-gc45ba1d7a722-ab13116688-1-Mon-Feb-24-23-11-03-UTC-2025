### Standard Currency Conversion Calculator
serviceId: currency-conversion-calculator
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/currency-conversion-calculator/documentation/index.md

Overview: The Standard Currency Conversion Calculator is a service for issuers to access Mastercard’s daily currency conversion rates and calculate cardholder billing amounts for card transactions. It supports building mobile or web experiences where cardholders can see the applicable conversion rate and billed amount based on their transaction details. Rates are published daily and are effective for 24 hours. The service is available in NA, LAC, MEA, Europe (excluding EEA), and AP; issuers in the EEA should use the Enhanced Currency Conversion Calculator API. Why it matters: This helps applications precisely determine conversion results for payment scenarios, verify the availability of the latest rates, and understand which currencies are supported. It supports use cases such as international peer-to-peer payments, travel expense tracking, e-commerce pricing, and banking transparency. By using Mastercard’s rates, the API ensures consistency with actual billing and helps users understand the financial impact of currency conversion. 

Keywords: currency conversion, fx rates, mastercard fx rates, currency conversion api, fx rates api

