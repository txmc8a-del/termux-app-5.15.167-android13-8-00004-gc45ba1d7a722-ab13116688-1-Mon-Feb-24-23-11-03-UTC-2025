### Mastercom-Extended
serviceId: mastercom-extended
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/mastercom-extended/documentation/index.md

Overview: Mastercom Extended is our next-generation API suite for cardholder dispute processing across the dispute resolution lifecycle. It enables issuers and acquirers to efficiently and securely query and update dispute data, with current capabilities focused on initiating disputes and first chargebacks for issuers, receiving chargebacks and creating representments for acquirers, and moving funds between parties through the Mastercard Switch. As Mastercom Extended expands to cover the full lifecycle, it will replace the existing Mastercom API. Why It Matters: Mastercom Extended helps reduce the time and complexity of resolving disputes by offering a modular, API-first approach to managing dispute workflows. Supported workflows include searching for transactions; creating and managing claims; initiating, updating, and reversing chargebacks; creating, acknowledging, and reversing representments; and managing reports, documents, and queues tied to chargebacks or representments. It also supports pre-arbitration, arbitration, pre-compliance, and compliance case filing (including related document management) and offers Send Payment dispute processing for Originating and Receiving Institutions.

Keywords: Mastercom Extended, Dispute resolution API for issuers, Dispute resolution API for acquirers, Dispute Management, Chargeback Processing API for chargeback and dispute resolution automation

