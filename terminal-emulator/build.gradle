### Automatic Billing Updater (ABU)
serviceId: automatic-billing-updater
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/automatic-billing-updater/documentation/index.md

Overview: Automatic Billing Updater (ABU) is one of the key security APIs on the Mastercard Developers Platform. Streamlining account lifestyle management for credential-on-file and recurring payment, ABU maintains a global repository of card account lifecycle events provided by issuers - such as new account creation, credential changes (ex: expiry updates or replacements), closures, brand flips, and portfolio upgrades. To obtain these lifecycle updates, ABU supports two integration models: a Push subscription model that delivers update notifications for accounts you subscribe to watch, and a Pull inquiry model for on‑demand checks via API or daily batch files.

Why it matters: Outdated credentials can cause a plethora of problems, both on the issuer and user side like declines, checkout friction, cart abandonment, and subscription disruptions.  ABU enables validation of current credentials before processing scheduled payments and supports subscribing new customer accounts for future change notifications. The push model is especially effective when future transaction timing is unpredictable, while the pull model works well as a fallback after a decline or as a proactive, periodic check to maintain account accuracy. 

