### Benefits Eligibility Service
serviceId: eligibility-api
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/eligibility-api/documentation/index.md

Overview: The Benefits Eligibility Service API offers features for third party vendors or merchants to verify benefits eligibility, create unique card identifiers, and generate access tokens. By using card numbers or identifiers, the Eligibility API confirms cardholder eligibility for specific Mastercard Benefits. The Eligibility API  caters to Mastercard Service Providers (vendors) that intend to utilize this service to retrieve benefits and insurance details specific to the cardholder’s PAN or specific to the cardholder’s BIN/product. Within the Benefits Eligibility Service are two sub-apis, the Eligibility API and the Access Token API. Integration of the Eligibility API component allows vendors to check eligibility of a card number for a service. The Access Token API component generates the actual authentication token.Why it matters: The Benefits Eligibility Service can be used for a plethora of different use cases. These include retrieving active benefits (can be specific to vendor, card, product, etc.). It can be used to retrieve products associated with a specific card number. Finally, it can be used to retrieve access tokens for the vendor website and retrieve a card identifier for a provided card number

