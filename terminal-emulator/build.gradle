### Consumer Clarity
serviceId: consumer-clarity
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/consumer-clarity/documentation/index.md

Overview: Consumer Clarity is an API that enriches cardholder transaction experiences and supports issuer operations with clear, real-time merchant and purchase details. It enables banking apps and call center teams to retrieve recognizable merchant names and logos, locations, and additional merchant context. The service also provides Ethoca-generated digital receipts (when the merchant participates in the Ethoca network), and subscription information with centralized management actions. All capabilities are accessible through the Consumer Clarity API (formerly the Enriched Transactions API).
Purpose and core functionality: In digital channels, Consumer Clarity delivers on-demand enrichment for transaction lists and details, helping cardholders recognize purchases, view available digital receipts, and manage subscriptions (for example, cancel, pause, upgrade) directly with merchants. In call centers, it returns real-time merchant and transaction data—such as order details, refunds, and merchant contact information—and, when applicable, First-Party Trust transaction data with compelling evidence, available via a secure URL, raw JSON, or a web-based UI.
Why it matters: By providing purchase transparency and context on demand, Consumer Clarity helps cardholders resolve confusion about transactions in real-time. For issuers, the richer data equips staff to make informed decisions and can eliminate costly, unnecessary chargebacks stemming from first-party fraud and customer disputes. The combined digital and call center capabilities streamline resolution, improve customer experience, and reduce operational overhead.

