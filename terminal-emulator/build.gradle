### Mastercard Digital Redemptions
serviceId: digital-redemptions
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/digital-redemptions/documentation/index.md

Digital Redemptions is an API that allows Digital Merchants or Issuers to offer points redemption within their checkout, for purchases made by members of the participating issuers rewards program. It enables cardholders (“Redeemers”) in participating Rewards Programs to convert rewards points into eligible products, services, or cash. The service supports creating redemptions by specifying points, cash value (with Mastercard calculating points), or both (with validation to ensure alignment) The digital redemptions API, if integrated by a merchant/issuer, allows consumers to redeem points directly on a merchant's website. Additionally, it can be used for data access for merchants, integration with a merchant's checkout for a seamless rewards experience, and can be used to customize the consumer experience.Why it matters: Digital Redemptions allows merchants and issuers to consolidate the system they use to offer loyalty points. Digital Redemptions streamlines rewards redemption at checkout by confirming account eligibility and good standing, and by handling the points-to-cash value conversion without requiring merchants to manage rewards logic or balance sources.Through the API, the customer can perform a variety of different actions. These include: searching/getting the profile of a points' redeemer, create/manage redemptions, reverse redemptions, update redemption status, get/create shipping address for redemptions, etc. 

