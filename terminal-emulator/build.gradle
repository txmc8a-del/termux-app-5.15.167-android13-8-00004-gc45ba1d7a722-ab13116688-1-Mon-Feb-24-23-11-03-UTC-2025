### Confirmed Fraud API
serviceId: fld-fraud-submission
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/fld-fraud-submission/documentation/index.md

The Fraud and Loss Database (FLD) is our enterprise source of truth for fraud transactions. We provide multiple channels to submit and manage confirmed fraud records, including Global File Transfer for batch submissions, manual search and submission via Mastercard Connect, file uploads (complete and minimal), and a growing API channel. Using APIs brings automation, efficiency, easier integration, personalization, and adaptability as needs evolve.Through the API channel, issuers or their processors can submit, update, delete, confirm, and track the status of fraud records for both Mastercard-built and issuer-built transactions. Submissions are processed in real time: requests are validated, the underlying transaction is located in our repositories when applicable, details are stored, and an Audit Control Number (ACN) is returned for reference. This service streamlines fraud reporting workflows, reduces manual effort, and ensures timely, consistent updates to a centralized fraud dataset. We also provide clear use cases and defined test cases to help teams validate end-to-end flows across add, change, delete, confirm, and status operations.

