### Offers for Publishers 
serviceId: presentment
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/presentment/documentation/index.md

The Mastercard Offers for Publishers API provides a set of calls for Publishers to implement an offers program in their digital channel. As a result, the offers programs can drive top-of-wallet preference, promote spending, and increase engagement with merchant-funded offers. The API provides endpoints for offer presentment, helping Publishers manage an end-to-end offers program across digital channels, including websites and mobile apps, using all capabilities through the offers for publishers product. Why it matters: Primarily used by patterns and publishers, offers for publishers provide APIs that support core functionalities across user account administration and offer presentment. These functionalities include the following: user account administration to enable publishers to enroll cardholders into an offers program, presentment for websites and mobile applications, cardholder enrollment, account updates, card replacements, and user/account lookup using publisher-provided identifiers.

