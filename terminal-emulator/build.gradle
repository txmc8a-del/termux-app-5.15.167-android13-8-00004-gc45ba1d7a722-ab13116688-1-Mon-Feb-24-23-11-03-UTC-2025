### Priceless Specials
serviceId: priceless-specials
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/priceless-specials/documentation/index.md

The Priceless Specials API provides a single platform where issuers, merchants, and cardholders can easily explore Mastercard offers and benefits from around the globe. Its key features include real-time offers that can be targeted for mass market and different cardholder segments.  These are exclusive for Mastercard cardholders. Priceless offers a readily curated list of featured programs and offers that can be filtered by location and category to be relevant to the users. These offers include key details like card product, offer eligibility, terms and conditions, etc.\n
Why it matters: Targeted towards issuers and strategic partners, the Priceless Specials API can be used to support several key use cases including retrieving offers, programs, benefits, languages, categories, countries, MC products, and merchant information.  Priceless Specials helps issuers enrich their digital channels with relevant, up-to-date offers and benefits, improving cardholder engagement. It centralizes discovery and retrieval of offers, benefits, programs, and related metadata, enabling filtering and presentation tailored to the issuer’s user experience. 

