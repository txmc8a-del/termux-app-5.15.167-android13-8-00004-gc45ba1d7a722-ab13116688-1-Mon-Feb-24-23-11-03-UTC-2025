### Authentication Facilitator
serviceId: authentication-facilitator
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/authentication-facilitator/documentation/index.md

Overview: The Authentication Facilitator API is a component of the Mastercard Authentication Service that enables MDES token requestors—such as digital wallets and commerce platforms—to authenticate cardholders using information maintained by the card issuer. It supports outbound web requests that notify issuers to deliver a Mastercard-generated authentication code to the cardholder. This code is then entered by the cardholder into the token requestor’s interface to complete authentication. The API is designed to work with any MDES token type and token requestor program, regardless of the card product or context of use, and is available only in approved business scenarios.

Why It Matters: The Authentication Facilitator API provides a secure and standardized way for token requestors to verify cardholder identity, enabling new digital use cases that require authentication beyond initial token provisioning. It helps issuers maintain control over authentication flows while supporting seamless consumer experiences. The service ensures privacy and security through mutually authenticated TLS and payload encryption, and is compliant with PCI DSS standards. By leveraging issuer-held cardholder data, the API supports flexible, scalable authentication across the MDES ecosystem.

