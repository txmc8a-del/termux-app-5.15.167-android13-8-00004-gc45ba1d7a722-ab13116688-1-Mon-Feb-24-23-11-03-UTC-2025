### Supplier Payment Agent
serviceId: mastercard-supplier-payment-agent
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/mastercard-supplier-payment-agent/documentation/index.md

Overview: Mastercard Supplier Payment Agent enables Supplier Payment Agents (such as banks, ERP automation agents, payment service providers) to act on behalf of Suppliers to retrieve and process payment instructions. We support managing both card and account-to-account (A2A) payment instructions, including updating instructions and retrieving instruction details and payment status. The service also facilitates linking between Suppliers and Buyers (e.g., nudging a Buyer Payment Agent to link, approving/rejecting requests, deleting links, and searching approved links). 

Why it matters: This API empowers Supplier Payment Agents to automate payment acceptance, streamline reconciliation, and enforce payment controls. It supports use cases such as supplier onboarding, payment tracking, and integration with commercial payment platforms. By leveraging Mastercard’s Business Payment Service, Supplier Payment Agents can offer suppliers a more efficient and scalable way to receive payments across diverse buyer networks.

