### MDES Pre-digitization
serviceId: mdes-pre-digitization
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/mdes-pre-digitization/documentation/index.md

Overview: MDES Pre-digitization is part of the Mastercard Digital Enablement Service (MDES), which replaces primary account numbers (PANs) with secure digital payment tokens for contactless, in-app, and card-on-file transactions. This service covers the processes required before a token is ready for use, enabling issuers to authorize token creation, authenticate account holders, and manage activation methods and code delivery. It supports both device provisioning and merchant-initiated tokenization, and is available via ISO network messages configured in MDES Manager or through web services that notify issuers of tokenization requests made by or on behalf of their cardholders.Why It Matters: MDES Pre-digitization allows issuers to guide the wallet experience and maintain control over token provisioning, even when working with third-party processors that lack native digital capabilities. It supports flexible implementation models—fully web service-based or hybrid—and reduces the effort, cost, and time required to adopt digital payments. Common use cases include token requestor-initiated tokenization and issuer-initiated tokenization, helping issuers deliver secure, seamless digital payment experiences while minimizing network message maintenance.

Keywords: Pre-Digitization, Post-Tokenization Authentication, Authorize Service, Notify Token Updated (NTU), Tokenization, Provisioning

