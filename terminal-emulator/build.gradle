### Commercial Event Notifications
serviceId: commercial-event-notifications
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/commercial-event-notifications/documentation/index.md

Overview: The commercial event notifications service generates and delivers notifications for events of interest to subscribers in the area of commercial payments using virtual card numbers. Subscribers can be issuers, companies, or agents who create VCNs to make business payments. Working in partnership with the In Control for Mobile Payments API, the commercial event notifications api delivers token events for VCNs generated by In Control for Commercial Payments or Business Payment Controls. Once setup, you can subscribe to receive notifications with the filter conditions for events you care about, across multiple subject clearing events. Why it matters:  Commercial event notifications empowers businesses with real-time insights into Virtual Card Network activity. Among other things, the Commercial Event Notifications can trigger immediate alerts for suspicious VCN activity, improve visibility on VCN usage patterns, stream reconciliation processes by having real-time transaction data, automate workflows, etc. Notifications are delivered via HTTPS POST and may batch multiple notifications (from the same or different subscriptions) into a single request; the endpoint must handle JSON, support TLS/mTLS, and de-duplicate potential repeat deliveries.

