### Mastercard Processing Core
serviceId: mastercard-processing-core
authType: OAuth1.0a
sourceUrl: https://developer.mastercard.com/mastercard-processing-core/documentation/index.md

Overview: Mastercard Processing Core provides APIs to manage card programs and transaction lifecycles within our Card Management System (CMS). We register transactions as documents and expose rich retrieval and management capabilities, including posting internal debit and credit transactions, charging ad‑hoc fees (predefined during onboarding), reversing transactions, and releasing blocked funds for pending transactions. The service also enables retrieving transactions and associated documents using multiple identifiers (such as ARN, RRN, SRN, and transactionId), alongside detailed amounts, currencies, posting statuses, and processing metadata.Beyond transactions, we support operational data management and controls. You can retrieve account contracts for a client (with pagination), obtain contract tree structure summaries, and fetch usage limit details stored in the CMS. Configuration uses dictionaries to validate and transform values between the API and CMS, and to enforce data formats (for example, character sets and masks), while classifiers and parameters can be set or retrieved at client or contract level.

